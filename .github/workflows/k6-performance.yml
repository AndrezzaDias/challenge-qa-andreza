name: K6 Performance Tests

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Cenário de carga'
        required: true
        default: '100'
        type: choice
        options:
          - '100'
          - '500'
          - '1000'

jobs:
  performance:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: k6-performance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar k6
        uses: grafana/setup-k6-action@v1

      - name: Criar pasta de relatórios
        run: mkdir -p reports

      - name: Executar cenário ${{ github.event.inputs.scenario }} VUs
        run: k6 run scripts/scenario-${{ github.event.inputs.scenario }}-users.js

      - name: Salvar relatório como artefato
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-${{ github.event.inputs.scenario }}-users
          path: k6-performance/reports/
          retention-days: 30

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: k6-performance/reports
          keep_files: true
          destination_dir: reports
